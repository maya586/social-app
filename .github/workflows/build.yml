name: Build Multi-Platform App

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android'
        required: false
        default: true
        type: boolean
      build_ios:
        description: 'Build iOS'
        required: false
        default: true
        type: boolean
      build_macos:
        description: 'Build macOS'
        required: false
        default: true
        type: boolean
      build_linux:
        description: 'Build Linux'
        required: false
        default: true
        type: boolean
      build_windows:
        description: 'Build Windows'
        required: false
        default: true
        type: boolean
      build_web:
        description: 'Build Web'
        required: false
        default: true
        type: boolean

env:
  FLUTTER_VERSION: '3.27.0'

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_android }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Build APK
        working-directory: client
        run: flutter build apk --release

      - name: Build App Bundle
        working-directory: client
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: client/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-appbundle
          path: client/build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_ios }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Create iOS platform files
        working-directory: client
        run: |
          if [ ! -d "ios" ]; then
            flutter create . --platforms ios
          fi

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Update iOS deployment target
        working-directory: client/ios
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 11.0/IPHONEOS_DEPLOYMENT_TARGET = 12.0/g' Runner.xcodeproj/project.pbxproj || true
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0/IPHONEOS_DEPLOYMENT_TARGET = 12.0/g' Runner.xcodeproj/project.pbxproj || true
          if [ -f "Podfile" ]; then
            sed -i '' "s/platform :ios, '11.0'/platform :ios, '12.0'/g" Podfile || true
            sed -i '' "s/platform :ios, '10.0'/platform :ios, '12.0'/g" Podfile || true
            echo "platform :ios, '12.0'" > Podfile.new
            tail -n +2 Podfile >> Podfile.new
            mv Podfile.new Podfile
          fi

      - name: Build iOS (no codesign)
        working-directory: client
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        working-directory: client/build/ios/iphoneos
        run: |
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r ../../../social-app-ios.ipa Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: client/social-app-ios.ipa

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_macos }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Create macOS platform files
        working-directory: client
        run: |
          if [ ! -d "macos" ]; then
            flutter create . --platforms macos
          fi

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Set macOS deployment target
        working-directory: client/macos
        run: |
          sed -i '' 's/MACOSX_DEPLOYMENT_TARGET = 10.14/MACOSX_DEPLOYMENT_TARGET = 10.15/g' Runner.xcodeproj/project.pbxproj || true
          sed -i '' 's/MACOSX_DEPLOYMENT_TARGET = 10.13/MACOSX_DEPLOYMENT_TARGET = 10.15/g' Runner.xcodeproj/project.pbxproj || true
          if [ -f "Podfile" ]; then
            sed -i '' "s/platform :osx, '10.14'/platform :osx, '10.15'/g" Podfile || true
            sed -i '' "s/platform :osx, '10.13'/platform :osx, '10.15'/g" Podfile || true
            echo "platform :osx, '10.15'" > Podfile.new
            tail -n +2 Podfile >> Podfile.new
            mv Podfile.new Podfile
          fi

      - name: Update pods
        working-directory: client/macos
        run: pod install --repo-update || true

      - name: Build macOS
        working-directory: client
        run: flutter build macos --release

      - name: Create DMG
        working-directory: client/build/macos/Build/Products/Release
        run: |
          brew install create-dmg || true
          create-dmg --volname "Social App" --window-pos 200 120 --window-size 800 400 --icon-size 100 --app-drop-link 600 185 "SocialApp.dmg" "social_app.app" || zip -r SocialApp-macos.zip social_app.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            client/build/macos/Build/Products/Release/*.dmg
            client/build/macos/Build/Products/Release/*.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_linux }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Build Linux
        working-directory: client
        run: flutter build linux --release

      - name: Create tarball
        working-directory: client/build/linux/x64/release/bundle
        run: tar -czvf social-app-linux.tar.gz *

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: client/build/linux/x64/release/bundle/social-app-linux.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_windows }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Build Windows
        working-directory: client
        run: flutter build windows --release

      - name: Create ZIP
        working-directory: client/build/windows/x64/runner/Release
        run: Compress-Archive -Path * -DestinationPath social-app-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: client/build/windows/x64/runner/Release/social-app-windows.zip

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Build Web
        working-directory: client
        run: flutter build web --release

      - name: Create ZIP
        working-directory: client/build
        run: zip -r web-build.zip web

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: client/build/web-build.zip

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Server
        working-directory: server
        run: |
          go mod tidy
          CGO_ENABLED=0 GOOS=linux go build -o server-linux ./cmd/server
          CGO_ENABLED=0 GOOS=windows go build -o server-windows.exe ./cmd/server
          CGO_ENABLED=0 GOOS=darwin go build -o server-darwin ./cmd/server

      - name: Upload Server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-builds
          path: |
            server/server-linux
            server/server-windows.exe
            server/server-darwin

  release:
    name: Create Release
    needs: [build-android, build-macos, build-linux, build-windows, build-web, build-server]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true