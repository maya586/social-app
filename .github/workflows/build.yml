name: Build Multi-Platform App

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android'
        required: false
        default: true
        type: boolean
      build_ios:
        description: 'Build iOS'
        required: false
        default: true
        type: boolean
      build_macos:
        description: 'Build macOS'
        required: false
        default: true
        type: boolean
      build_linux:
        description: 'Build Linux'
        required: false
        default: true
        type: boolean
      build_windows:
        description: 'Build Windows'
        required: false
        default: true
        type: boolean
      build_web:
        description: 'Build Web'
        required: false
        default: true
        type: boolean
      build_harmony:
        description: 'Build HarmonyOS (Experimental)'
        required: false
        default: false
        type: boolean

env:
  FLUTTER_VERSION: '3.24.5'

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_android }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Build APK
        working-directory: client
        run: flutter build apk --release

      - name: Build App Bundle
        working-directory: client
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: client/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-appbundle
          path: client/build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_ios }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Create iOS platform files
        working-directory: client
        run: |
          if [ ! -d "ios" ]; then
            flutter create . --platforms ios
          fi

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Build iOS (no codesign)
        working-directory: client
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        working-directory: client/build/ios/iphoneos
        run: |
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r ../../../social-app-ios.ipa Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: client/social-app-ios.ipa

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_macos }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Create macOS platform files
        working-directory: client
        run: |
          if [ ! -d "macos" ]; then
            flutter create . --platforms macos
          fi

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Build macOS
        working-directory: client
        run: flutter build macos --release

      - name: Create DMG
        working-directory: client/build/macos/Build/Products/Release
        run: |
          brew install create-dmg || true
          create-dmg --volname "Social App" --window-pos 200 120 --window-size 800 400 --icon-size 100 --app-drop-link 600 185 "SocialApp.dmg" "social_app.app" || zip -r SocialApp-macos.zip social_app.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            client/build/macos/Build/Products/Release/*.dmg
            client/build/macos/Build/Products/Release/*.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_linux }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Build Linux
        working-directory: client
        run: flutter build linux --release

      - name: Create tarball
        working-directory: client/build/linux/x64/release/bundle
        run: tar -czvf social-app-linux.tar.gz *

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: client/build/linux/x64/release/bundle/social-app-linux.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_windows }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Build Windows
        working-directory: client
        run: flutter build windows --release

      - name: Create ZIP
        working-directory: client/build/windows/x64/runner/Release
        run: Compress-Archive -Path * -DestinationPath social-app-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: client/build/windows/x64/runner/Release/social-app-windows.zip

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Build Web
        working-directory: client
        run: flutter build web --release

      - name: Create ZIP
        working-directory: client/build
        run: zip -r web-build.zip web

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: client/build/web-build.zip

  build-harmony:
    name: Build HarmonyOS
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_harmony }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter for HarmonyOS
        run: |
          echo "HarmonyOS build is experimental"
          echo "Official Flutter does not support HarmonyOS yet"
          echo "For HarmonyOS support, please use OpenHarmony Flutter:"
          echo "https://gitee.com/openharmony-sig/flutter_flutter"
          echo ""
          echo "Steps to build for HarmonyOS:"
          echo "1. Clone OpenHarmony Flutter from the above URL"
          echo "2. Set FLUTTER_ROOT to OpenHarmony Flutter"
          echo "3. Run: flutter build hap --release"

      - name: Setup Ohos Flutter (Experimental)
        run: |
          git clone https://gitee.com/openharmony-sig/flutter_flutter.git /opt/flutter-ohos || true
          export FLUTTER_ROOT=/opt/flutter-ohos
          export PATH=$PATH:$FLUTTER_ROOT/bin

      - name: Get dependencies
        working-directory: client
        run: |
          if command -v flutter &> /dev/null; then
            flutter pub get
          else
            echo "Flutter for HarmonyOS not available"
          fi

      - name: Build HarmonyOS HAP
        working-directory: client
        run: |
          if command -v flutter &> /dev/null; then
            flutter build hap --release || echo "HAP build not yet supported"
          else
            echo "Skipping HarmonyOS build - requires OpenHarmony Flutter SDK"
            echo "Visit: https://gitee.com/openharmony-sig/samples for more info"
            exit 0
          fi

      - name: Create placeholder
        run: |
          echo "HarmonyOS build requires:" > harmonyos-info.txt
          echo "- OpenHarmony SDK" >> harmonyos-info.txt
          echo "- OpenHarmony Flutter fork" >> harmonyos-info.txt
          echo "" >> harmonyos-info.txt
          echo "See: https://gitee.com/openharmony-sig/flutter_flutter" >> harmonyos-info.txt

      - name: Upload HarmonyOS info
        uses: actions/upload-artifact@v4
        with:
          name: harmonyos-info
          path: harmonyos-info.txt

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Server
        working-directory: server
        run: |
          go mod tidy
          CGO_ENABLED=0 GOOS=linux go build -o server-linux ./cmd/server
          CGO_ENABLED=0 GOOS=windows go build -o server-windows.exe ./cmd/server
          CGO_ENABLED=0 GOOS=darwin go build -o server-darwin ./cmd/server

      - name: Upload Server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-builds
          path: |
            server/server-linux
            server/server-windows.exe
            server/server-darwin

  release:
    name: Create Release
    needs: [build-android, build-macos, build-linux, build-windows, build-web, build-server]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true